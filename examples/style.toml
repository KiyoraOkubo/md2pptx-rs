[slide]
size = "16:9"
background = "#ffffff"
padding = 40

[title]
font_family = "Arial"
font_size = 36
color = "#111111"
bold = true
margin_bottom = 24

[body]
font_family = "Arial"
font_size = 22
color = "#222222"
line_spacing = 1.2
margin_bottom = 12

[list]
font_family = "Arial"
font_size = 22
color = "#222222"
indent = 28
margin_bottom = 8

[code_inline]
font_family = "Consolas"
font_size = 20
color = "#c7254e"
background = "#f9f2f4"

[code_block]
font_family = "Consolas"
font_size = 16
color = "#111111"
background = "#f5f5f5"
padding = 16
margin = 12

[quote]
font_family = "Arial"
font_size = 20
color = "#555555"
border_color = "#cccccc"
padding = 12
margin = 12

[image]
max_width = "100%"
margin = 16

[math]
renderer = "literal"
